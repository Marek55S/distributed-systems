<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Health Data Analyzer</title>
</head>
<body>
    <h1>Health Data Analyzer</h1>

    <form action="/analyze" method="post">

        <label for="country">Enter Country Name (e.g., Italy, Germany, Japan):</label><br>
        <input type="text" name="country" id="country" required>
        <br><br>

        <label for="year">Select Year:</label><br>
        <select name="year" id="year" required>
            <option value="2020">2020</option>
            <option value="2021">2021</option>
            <option value="2022">2022</option>
        </select>
        <br><br>

        <label for="month">Select Month:</label><br>
        <select name="month" id="month" required>
            <option value="1">January</option>
            <option value="2">February</option>
            <option value="3">March</option>
            <option value="4">April</option>
            <option value="5">May</option>
            <option value="6">June</option>
            <option value="7">July</option>
            <option value="8">August</option>
            <option value="9">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
        </select>
        <br><br>

        <label for="api_token">API Access Token (type: password123):</label><br>
        <input type="password" name="api_token" required>
        <br><br>

        <button type="submit">Run Analysis</button>
    </form>
</body>
</html>
